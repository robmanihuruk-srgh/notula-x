<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NOTULA">
<meta name="application-name" content="NOTULA">
<meta name="theme-color" content="#0F1117">
<meta name="description" content="Sistem Monitor Rapat — Notula">
<meta name="msapplication-TileColor" content="#0F1117">
<meta name="msapplication-starturl" content="./">
<link rel="manifest" id="pwa-manifest">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<title>NOTULA — Sistem Monitor Rapat</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0F1117;--bg2:#161922;--bg3:#1E2330;--bg4:#252B3B;--card:#1A1F2E;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --text:#F0F2F8;--text2:#8B93B0;--text3:#5A6380;
  --accent:#5B8AF0;--accent2:#7B6CF6;--green:#34D399;--yellow:#FBBF24;
  --red:#F87171;--orange:#FB923C;--teal:#2DD4BF;--pink:#F472B6;
  --radius-sm:8px;--radius:12px;--radius-lg:16px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--font:'Plus Jakarta Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ═══ MEETING SELECTOR ═══ */
#meeting-selector-panel {
  background:var(--bg3);
  border-radius:var(--radius-sm);
}

.other-meeting-item {
  padding:9px 12px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-size:12px;
  color:var(--text2);
  border:1px solid transparent;
  margin-bottom:5px;
  display:flex;
  align-items:center;
  gap:8px;
  transition:all .15s;
}

.other-meeting-item:hover {
  background:rgba(91,138,240,0.08);
  border-color:var(--border2);
  color:var(--text);
}

.other-meeting-item.active-meeting-item {
  background:rgba(91,138,240,0.15);
  border-color:var(--accent);
  color:var(--accent);
  font-weight:600;
}

.meeting-status-dot {
  width:6px;
  height:6px;
  border-radius:50%;
  flex-shrink:0;
}

.meeting-status-dot.berlangsung {
  background:var(--accent);
}

.meeting-status-dot.selesai {
  background:var(--green);
}

.meeting-status-dot.rencana {
  background:var(--yellow);
}

.meeting-item-name {
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  min-width:0;
}

.meeting-item-date {
  font-size:10px;
  color:var(--text3);
  flex-shrink:0;
}

/* SIDEBAR */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:150;}
.sidebar-overlay.open{display:block;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:transform .3s;}
.sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border);}
.logo-mark{font-family:'DM Serif Display',serif;font-size:26px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

/* MAIN */
.main{margin-left:260px;min-height:100vh;display:none;}
.topbar{position:sticky;top:0;z-index:50;background:rgba(15,17,23,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:13px 28px;display:flex;align-items:center;gap:14px;}
.topbar-title{font-size:15px;font-weight:600;flex:1;}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#4A79E0;transform:translateY(-1px);}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--bg4);color:var(--text);}

/* CONTENT */
.content{padding:26px 28px 100px;}
.section{display:none;}
.section.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-260px);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .topbar{padding:11px 14px;gap:10px;}
}
</style>

</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div style="display:flex;align-items:center;gap:9px;">
      <div class="logo-mark">NOTULA</div>
    </div>
    <div class="logo-sub" style="padding-left:27px;">Sistem Monitor Rapat</div>
  </div>

  <!-- ═══ MEETING SELECTOR PANEL ═══ -->
  <div id="meeting-selector-panel" style="padding:12px;border-bottom:1px solid var(--border);margin-bottom:8px;">
    <div style="font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding:0 6px;">📌 Rapat Aktif</div>
    
    <!-- Active Meeting Display -->
    <div id="active-meeting-display" style="padding:10px 12px;background:rgba(91,138,240,0.1);border:1px solid rgba(91,138,240,0.3);border-radius:var(--radius-sm);margin-bottom:10px;cursor:pointer;" onclick="toggleOtherMeetings()">
      <div style="font-size:12px;font-weight:600;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="active-meeting-name">Pilih Rapat...</div>
      <div style="font-size:10px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:4px;">
        <span id="active-meeting-status">⏳</span>
        <span id="active-meeting-date">—</span>
      </div>
    </div>
    
    <!-- Other Meetings List (Hidden by default) -->
    <div id="other-meetings-list" style="display:none;max-height:180px;overflow-y:auto;">
      <div style="font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:6px 6px 8px;margin-bottom:4px;border-bottom:1px solid var(--border);">Rapat Lainnya</div>
      <div id="other-meetings-items"></div>
    </div>
  </div>

  <nav class="sidebar-nav" style="flex:1;padding:10px;overflow-y:auto;">
    <div style="font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:12px 10px 6px;">Menu</div>
    <div class="nav-item active" onclick="showSection('dashboard',this)" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13.5px;font-weight:500;color:var(--text2);transition:all .15s;">
      <span style="width:18px;text-align:center;font-size:15px;">⬡</span> Dashboard
    </div>
  </nav>

  <div class="sidebar-footer" style="padding:14px 16px;border-top:1px solid var(--border);">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;background:var(--accent);" id="sb-avatar">?</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="sb-name">—</div>
        <div style="font-size:10px;color:var(--text3);margin-top:1px;" id="sb-role">—</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN APP -->
<main class="main" id="main-app">
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">Dashboard</span>
    <button class="btn btn-primary" id="btn-new-rapat">＋ Rapat Baru</button>
  </div>

  <div class="content">
    <!-- DASHBOARD -->
    <div class="section active" id="section-dashboard">
      <h1>Multi-Rapat Meeting Selector</h1>
      <p>Fitur pemilihan rapat aktif sudah terintegrasi!</p>
      <p>Klik pada card rapat di sidebar untuk mengganti rapat aktif.</p>
    </div>
  </div>
</main>

<script>
// ── MULTI-RAPAT STATE ──
var activeRapatId    = null;
var allUserRapats    = [];
var showOtherMeetings = false;
var localRapat       = [];

function setActiveRapat(rapatId) {
  activeRapatId = rapatId;
  localStorage.setItem('activeRapatId', rapatId);
  showOtherMeetings = false;
  updateMeetingSelectorUI();
  reloadAllDataForActiveRapat();
}

function toggleOtherMeetings() {
  showOtherMeetings = !showOtherMeetings;
  var otherList = document.getElementById('other-meetings-list');
  if (showOtherMeetings) {
    otherList.style.display = 'block';
  } else {
    otherList.style.display = 'none';
  }
}

function updateMeetingSelectorUI() {
  var activeMeeting = localRapat.find(r => r.id === activeRapatId);
  var activeName = document.getElementById('active-meeting-name');
  var activeStatus = document.getElementById('active-meeting-status');
  var activeDate = document.getElementById('active-meeting-date');
  
  if (activeMeeting) {
    activeName.textContent = activeMeeting.nama || 'Rapat Tanpa Nama';
    activeStatus.textContent = getStatusEmoji(activeMeeting.status);
    activeDate.textContent = formatDateShort(activeMeeting.tanggal);
  } else {
    activeName.textContent = 'Pilih Rapat...';
    activeStatus.textContent = '?';
    activeDate.textContent = '—';
  }
  
  var otherItems = document.getElementById('other-meetings-items');
  otherItems.innerHTML = '';
  
  localRapat.forEach(function(r) {
    if (r.id !== activeRapatId) {
      var item = document.createElement('div');
      item.className = 'other-meeting-item';
      item.onclick = function() { setActiveRapat(r.id); };
      
      var dot = '<span class="meeting-status-dot ' + (r.status || 'rencana') + '"></span>';
      var name = '<span class="meeting-item-name">' + (r.nama || 'Rapat Tanpa Nama') + '</span>';
      var date = '<span class="meeting-item-date">' + formatDateShort(r.tanggal) + '</span>';
      
      item.innerHTML = dot + name + date;
      otherItems.appendChild(item);
    }
  });
}

function getStatusEmoji(status) {
  var map = { 'berlangsung':'🔴', 'selesai':'✅', 'rencana':'⏳' };
  return map[status] || '?';
}

function formatDateShort(dateStr) {
  if (!dateStr) return '—';
  try {
    var d = new Date(dateStr);
    return (d.getDate()) + '/' + (d.getMonth() + 1);
  } catch(e) { return '—'; }
}

function reloadAllDataForActiveRapat() {
  console.log('Reloading data for rapat:', activeRapatId);
}

function showSection(sectionName) {
  console.log('Showing section:', sectionName);
}

function showApp() {
  // Sample data untuk testing
  localRapat = [
    { id: '1', nama: 'Rapat Koordinasi', status: 'berlangsung', tanggal: '2026-04-08' },
    { id: '2', nama: 'Rapat Sponsor', status: 'rencana', tanggal: '2026-04-09' },
    { id: '3', nama: 'Rapat Venue', status: 'selesai', tanggal: '2026-04-07' }
  ];
  
  var savedActiveRapatId = localStorage.getItem('activeRapatId');
  
  if (!activeRapatId) {
    var berlangsung = localRapat.find(r => r.status === 'berlangsung');
    activeRapatId = berlangsung ? berlangsung.id : (localRapat[0] ? localRapat[0].id : null);
    if (savedActiveRapatId && localRapat.find(r => r.id === savedActiveRapatId)) {
      activeRapatId = savedActiveRapatId;
    }
  }
  
  updateMeetingSelectorUI();
  
  document.getElementById('main-app').style.display = 'flex';
  document.getElementById('sidebar').style.display = 'flex';
}

// Initialize app
window.addEventListener('DOMContentLoaded', showApp);
</script>

</body>
</html>
